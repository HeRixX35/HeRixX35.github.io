<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickman Empires - Minijuegos Retro</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #eeeeee;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }
        #game-container {
            width: 800px;
            height: 600px;
            background-color: #000;
            border: 4px solid #444;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }
        h1 { color: #ffcc00; }
    </style>
</head>
<body>
    <h1>Juega a Stickman Empires</h1>
    <p>Cargando emulador sin necesidad de Flash Player...</p>

    <div id="game-container"></div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("game-container");
            container.appendChild(player);

            // ¡SÚPER IMPORTANTE! Este nombre debe ser idéntico al de tu archivo
            player.load("stickman.swf");
            
            player.style.width = "100%";
            player.style.height = "100%";
        });
    </script>
</body>
</html>
