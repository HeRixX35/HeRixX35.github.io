<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Flash Games Archive</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 20px; text-align: center; }
        .header { margin-bottom: 20px; }
        h1 { color: #ffcc00; font-size: 36px;}
        input[type="text"] { padding: 12px; width: 350px; border-radius: 8px; border: none; font-size: 16px; outline: none; background: #333; color: white;}
        .tags { margin: 20px 0; }
        button { padding: 8px 15px; margin: 5px; cursor: pointer; border-radius: 5px; border: none; background: #444; color: white; transition: 0.2s;}
        button:hover { background: #555; }
        button.active { background: #ffcc00; color: black; font-weight: bold; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .card { background: #2a2a2a; padding: 15px; border-radius: 8px; width: 200px; cursor: pointer; transition: transform 0.2s; border: 1px solid #444;}
        .card:hover { transform: translateY(-5px); border-color: #ffcc00;}
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; background: #111; margin-bottom: 10px; }
        .card h3 { margin: 0 0 5px 0; font-size: 18px; color: #fff; }
        .card small { color: #888; text-transform: uppercase; font-size: 12px;}
        
        #player-section { display: none; margin-top: 20px; }
        #game-container { width: 800px; height: 600px; margin: 0 auto; background: black; border: 4px solid #555; border-radius: 8px; overflow: hidden;}
        .back-btn { margin-bottom: 15px; background: #ff3333; font-size: 16px; font-weight: bold;}
        .back-btn:hover { background: #cc0000; }
    </style>
</head>
<body>

    <div id="main-section">
        <div class="header">
            <h1>🎮 Retro Flash Archive</h1>
            <input type="text" id="search-bar" placeholder="Search for a game... (e.g., stickman)">
        </div>

        <div class="tags" id="tags-container">
            </div>

        <div class="grid" id="games-container">
            </div>
    </div>

    <div id="player-section">
        <button class="back-btn" onclick="goBack()">⬅ Back to Games Menu</button>
        <div id="game-container"></div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        // ==========================================
        // HOW TO ADD GAMES IN THE FUTURE
        // ==========================================
        // Every time someone on TikTok asks for a game, just copy one of these blocks {}
        // and add it to the list. The website will automatically update!
        
        const gamesCatalog = [
            {
                name: "Stickman Empires",
                tags: ["strategy", "stickman"],
                image: "https://via.placeholder.com/200x120/444444/ffcc00?text=Stickman",
                type: "local", 
                file: "stickman.swf" // Make sure this EXACT file name is in your GitHub
            },
            {
                name: "Fireboy and Watergirl",
                tags: ["puzzle", "co-op"],
                image: "https://via.placeholder.com/200x120/444444/00ccff?text=Fire+Water",
                type: "link", // Use "link" if you don't have the .swf and want to link out
                file: "https://www.crazygames.com/game/fireboy-and-watergirl-the-forest-temple"
            },
            {
                name: "Bloons Tower Defense",
                tags: ["strategy", "tower defense"],
                image: "https://via.placeholder.com/200x120/444444/55ff55?text=Bloons",
                type: "local",
                file: "bloons.swf"
            }
        ];

        // ==========================================
        // ENGINE LOGIC (DO NOT TOUCH)
        // ==========================================
        let activeTag = null;

        function renderGames(searchText = "") {
            const container = document.getElementById("games-container");
            container.innerHTML = ""; 
            const cleanText = searchText.toLowerCase().trim();

            gamesCatalog.forEach(game => {
                const matchText = game.name.toLowerCase().includes(cleanText);
                const matchTag = !activeTag || game.tags.includes(activeTag);

                if (matchText && matchTag) {
                    const div = document.createElement("div");
                    div.className = "card";
                    div.innerHTML = `
                        <img src="${game.image}" alt="${game.name}">
                        <h3>${game.name}</h3>
                        <small>${game.tags.join(" • ")}</small>
                    `;
                    div.onclick = () => openGame(game);
                    container.appendChild(div);
                }
            });
        }

        function renderTags() {
            const container = document.getElementById("tags-container");
            const allTags = [...new Set(gamesCatalog.flatMap(g => g.tags))];

            allTags.forEach(tag => {
                const btn = document.createElement("button");
                btn.innerText = tag.toUpperCase();
                btn.onclick = () => {
                    if (activeTag === tag) {
                        activeTag = null;
                        btn.classList.remove("active");
                    } else {
                        activeTag = tag;
                        document.querySelectorAll(".tags button").forEach(b => b.classList.remove("active"));
                        btn.classList.add("active");
                    }
                    renderGames(document.getElementById("search-bar").value);
                };
                container.appendChild(btn);
            });
        }

        function openGame(game) {
            if (game.type === "link") {
                window.open(game.file, "_blank");
            } else if (game.type === "local") {
                document.getElementById("main-section").style.display = "none";
                document.getElementById("player-section").style.display = "block";
                
                const container = document.getElementById("game-container");
                container.innerHTML = ""; 
                
                const ruffle = window.RufflePlayer.newest();
                const player = ruffle.createPlayer();
                container.appendChild(player);
                player.load(game.file);
                player.style.width = "100%";
                player.style.height = "100%";
            }
        }

        function goBack() {
            document.getElementById("main-section").style.display = "block";
            document.getElementById("player-section").style.display = "none";
            document.getElementById("game-container").innerHTML = ""; 
        }

        document.getElementById("search-bar").addEventListener("input", (e) => {
            renderGames(e.target.value);
        });

        renderTags();
        renderGames();
    </script>
</body>
</html>
