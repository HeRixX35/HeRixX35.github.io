<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroFlash | Arcade Archive</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #c084fc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            padding: 1rem 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-text {
            font-family: 'Lexend', sans-serif;
            font-size: 1.6rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-request {
            background: var(--primary);
            color: white;
            padding: 0.7rem 1.4rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-request:hover {
            transform: translateY(-2px);
            background: var(--primary-hover);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        main {
            flex: 1;
            padding: 3rem 8%;
        }

        .section-title {
            font-family: 'Lexend', sans-serif;
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .card-info {
            padding: 1.25rem;
        }

        .card-info h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.1rem;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            background: rgba(129, 140, 248, 0.1);
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        footer {
            text-align: center;
            padding: 3rem;
            background: #020617;
            margin-top: 4rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .footer-text {
            color: #64748b;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Contenedor del Emulador */
        #game-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.98);
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #ruffle-player {
            width: 90%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        
        .close-overlay {
            position: absolute;
            top: 25px;
            right: 35px;
            color: white;
            font-size: 3rem;
            cursor: pointer;
            line-height: 1;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <span class="logo-text">RETROFLASH</span>
    </div>
    <a href="https://www.tiktok.com/@tu_usuario" class="btn-request" target="_blank">Pide un Juego</a>
</header>

<main>
    <h2 class="section-title">Archivo de Juegos Flash</h2>
    <div class="grid" id="game-grid">
        </div>
</main>

<div id="game-overlay">
    <span class="close-overlay" onclick="closeGame()">&times;</span>
    <div id="ruffle-player"></div>
</div>

<footer>
    <div class="footer-text">
        <p><strong>RetroFlash</strong> es un proyecto de preservación digital.</p>
        <p style="font-size: 0.8rem;">Desarrollado con el motor Ruffle. Los derechos de cada juego pertenecen a sus creadores originales.</p>
    </div>
</footer>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<script>
    const gameGrid = document.getElementById('game-grid');
    const overlay = document.getElementById('game-overlay');
    const playerContainer = document.getElementById('ruffle-player');

    // 1. Cargar la base de datos de juegos
    fetch('games.json')
        .then(response => response.json())
        .then(games => {
            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // Generamos los tags
                const tagsHTML = game.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
                
                card.innerHTML = `
                    <img src="${game.image}" alt="${game.name}">
                    <div class="card-info">
                        <h3>${game.name}</h3>
                        <div class="tag-container">${tagsHTML}</div>
                    </div>
                `;
                
                card.onclick = () => launchGame(game.file);
                gameGrid.appendChild(card);
            });
        })
        .catch(err => console.error("Error cargando el catálogo:", err));

    // 2. Función para lanzar el emulador
    function launchGame(swfFile) {
        overlay.style.display = 'flex';
        document.body.style.overflow = 'hidden'; // Bloquea el scroll

        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        
        playerContainer.innerHTML = '';
        playerContainer.appendChild(player);
        
        player.load({
            url: swfFile,
            allowScriptAccess: true
        });
    }

    // 3. Función para cerrar el juego
    function closeGame() {
        overlay.style.display = 'none';
        document.body.style.overflow = 'auto'; // Libera el scroll
        playerContainer.innerHTML = '';
    }
</script>

</body>
</html>
